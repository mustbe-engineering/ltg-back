defaultContentLanguage: 'es'

languages:
  es:
    languageName: 'Español'
    contentDir: 'content/es'
    weight: 1
  en:
    languageName: 'English'
    contentDir: 'content/en'
    weight: 2

# Output Configuration for Headless
outputs:
  home: ["JSON"]
  page: ["JSON"]
  section: ["JSON"]
  taxonomy: ["JSON"]
  term: ["JSON"]

# Allow unsafe HTML in markdown (for rich content)
markup:
  goldmark:
    renderer:
      unsafe: true

# Taxonomies
taxonomies:
  category: "categories"
  tag: "tags"

# Build options
buildFuture: true
buildDrafts: false
