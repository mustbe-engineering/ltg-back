backend:
  name: git-gateway
  branch: main

i18n:
  structure: multiple_folders
  locales: [es, en]
  default_locale: es

local_backend: true

media_folder: "static/images"
public_folder: "/images"

# Custom Branding
logo_url: "/images/logo.png"

collections:
  # --- Blog ---
  - name: "blog"
    label: "Blog"
    folder: "content/es/blog"
    create: true
    i18n: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string", i18n: true}
      - {label: "Publish Date", name: "date", widget: "datetime", i18n: "duplicate"}
      - {label: "Author", name: "author", widget: "string", i18n: "duplicate"}
      - {label: "Category", name: "category", widget: "string", i18n: "duplicate"}
      - {label: "Featured Image", name: "image", widget: "image", i18n: "duplicate"}
      - {label: "Body", name: "body", widget: "markdown", i18n: true}

  # --- Events ---
  - name: "events"
    label: "Eventos"
    folder: "content/es/events"
    create: true
    i18n: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string", i18n: true}
      - {label: "Event Date", name: "date", widget: "datetime", i18n: "duplicate"}
      - {label: "Location", name: "location", widget: "string", i18n: "duplicate"}
      - {label: "Type", name: "type", widget: "string", i18n: "duplicate"}
      - {label: "Description", name: "description", widget: "text", i18n: true}
      - {label: "Highlight", name: "highlight", widget: "boolean", i18n: "duplicate"}
      - {label: "Body", name: "body", widget: "markdown", i18n: true}

  # --- Podcast ---
  - name: "podcast"
    label: "Podcast"
    folder: "content/es/podcast"
    create: true
    i18n: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string", i18n: true}
      - {label: "Release Date", name: "date", widget: "datetime", i18n: "duplicate"}
      - {label: "Duration", name: "duration", widget: "string", i18n: "duplicate"}
      - {label: "Guest", name: "guest", widget: "string", i18n: "duplicate"}
      - {label: "Description", name: "description", widget: "text", i18n: true}
      - {label: "Audio URL", name: "audio_url", widget: "string", i18n: "duplicate"}
      - {label: "Body", name: "body", widget: "markdown", i18n: true}

  # --- Pages (Single Files) ---
  - name: "pages"
    label: "Páginas"
    files:
      - name: "home"
        label: "Home Page"
        file: "content/_index.md"
        fields:
          - {label: "Title", name: "title", widget: "string", hidden: true}
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Badge", name: "badge", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
          - label: "Feature Section"
            name: "feature_section"
            widget: "object"
            fields:
              - {label: "Badge", name: "badge", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}

      - name: "manifesto"
        label: "Manifiesto"
        file: "content/es/manifesto.md"
        i18n: true
        fields:
          - {label: "Title", name: "title", widget: "string", i18n: true}
          - {label: "Quote", name: "quote", widget: "text", i18n: true}
          - label: "Principles"
            name: "principles"
            widget: "list"
            i18n: true
            fields:
              - {label: "Number", name: "number", widget: "number", i18n: "duplicate"}
              - {label: "Title", name: "title", widget: "string", i18n: true}
              - {label: "Body", name: "body", widget: "text", i18n: true}
          - {label: "Footer Text", name: "footer_text", widget: "string", i18n: true}
