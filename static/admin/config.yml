backend:
  name: netlify
  repo: mustbe-engineering/ltg-back
  branch: main
  site_domain: cms.ladiesthegathering.com

media_folder: "static/images"
public_folder: "/images"

collections:
  # --- Blog ---
  - name: "blog"
    label: "Blog"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Author", name: "author", widget: "string"}
      - {label: "Category", name: "category", widget: "string"}
      - {label: "Featured Image", name: "image", widget: "image"}
      - {label: "Body", name: "body", widget: "markdown"}

  # --- Events ---
  - name: "events"
    label: "Eventos"
    folder: "content/events"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Location", name: "location", widget: "string"}
      - {label: "Type", name: "type", widget: "select", options: ["Insignia", "Online", "Principiantes"]}
      - {label: "Highlight", name: "highlight", widget: "boolean", default: false}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Body", name: "body", widget: "markdown"}

  # --- Podcast ---
  - name: "podcast"
    label: "Podcast"
    folder: "content/podcast"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Guest", name: "guest", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Audio URL", name: "audio_url", widget: "string"}

  # --- Pages (Single Files) ---
  - name: "pages"
    label: "Páginas"
    files:
      - name: "home"
        label: "Home Page"
        file: "content/_index.md"
        fields:
          - {label: "Title", name: "title", widget: "string", hidden: true}
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Badge", name: "badge", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Subtitle", name: "description", widget: "text"}
          - label: "Feature Section"
            name: "feature_section"
            widget: "object"
            fields:
              - {label: "Badge", name: "badge", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
